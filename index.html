<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星月喵滑倒遊戲</title>
  <meta property="og:title" content="星月喵滑倒遊戲" />
  <style>
    @import url(https://fonts.bunny.net/css?family=azeret-mono:400,700,900);

    :root {
      --col-bg: #FFD59D;
      --col-bg-light: #FFDCAE;
      --col-bg-lighter: #FFEEDB;
      --col-primary: #FF5300;
      --col-primary-dark: #FF2700;
      --col-primary-light: #FF8800;
      --col-shadow: rgba(0, 0, 0, 0.25);
      --col-white: #fff;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    body {
      background-color: var(--col-bg);
      font-family: 'Azeret Mono', sans-serif;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      height: 100vh;
      height: 100dvh;
      padding-bottom: 70px;
    }

    #legend {
      min-width: 130px;
      padding: 10px;
      background-color: var(--col-bg-lighter);
      border: 2px solid var(--col-primary);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
    }

    #legend-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--col-primary-dark);
      margin-bottom: 4px;
      text-align: center;
    }

    .legend-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 6px;
    }

    .legend-row img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .legend-row span {
      color: #333;
    }

    .legend-row b {
      color: var(--col-primary);
    }

    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--col-bg-light);
      border-top: 3px solid var(--col-primary);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font-size: 16px;
      font-weight: 700;
      z-index: 100;
    }

    #status-bar span {
      color: var(--col-primary-dark);
      font-weight: 900;
      font-size: 18px;
    }

    #status-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #restart-btn, #mobile-legend-btn {
      background-color: var(--col-primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #restart-btn:hover, #mobile-legend-btn:hover {
      background-color: var(--col-primary-dark);
    }

    #mobile-legend-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 300;
    }

    #mobile-legend-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mobile-legend-panel {
      background-color: var(--col-bg-lighter);
      border: 3px solid var(--col-primary);
      border-radius: 16px;
      padding: 40px 20px 20px 20px;
      max-width: 90%;
      max-height: 70vh;
      overflow-y: auto;
      position: relative;
    }

    #mobile-legend-close {
      position: absolute;
      top: 8px;
      right: 8px;
      background-color: var(--col-primary-dark);
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        padding: 0 8px 90px 8px;
        align-items: center;
        justify-content: center;
      }

      #legend {
        display: none;
      }

      #mobile-legend-btn {
        display: block;
      }

      #status-bar {
        font-size: 14px;
        padding: 10px 16px;
      }

      #status-bar span {
        font-size: 16px;
      }

      #game-score {
        font-size: 48px;
      }

      #game-end-title {
        font-size: 32px;
      }

      #game-end-link {
        font-size: 18px;
      }
    }

    #game-canvas {
      position: relative;
    }

    #game-ui {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
      display: none;
      transform-origin: top left;
    }

    #game-score {
      position: absolute;
      width: 100%;
      border-bottom: 2px dotted #333;
      font-size: 84px;
      font-weight: 900;
      padding-left: 16px;
      color: var(--col-bg-lighter);
      text-shadow: 3px 3px 0 var(--col-primary), -3px -3px 0 var(--col-primary), -3px 3px 0 var(--col-primary), 3px -3px 0 var(--col-primary);
    }

    #game-end-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-items: center;
      background-color: var(--col-shadow);
    }

    #game-end {
      text-align: center;
      padding: 32px 48px;
      background-color: var(--col-bg-lighter);
      border: 5px solid var(--col-primary);
      box-shadow: 0 4px 32px var(--col-shadow);
      border-radius: 32px;
      margin: 0 auto;
      pointer-events: initial;
      user-select: initial;
    }

    #game-end-title {
      font-weight: 700;
      font-size: 48px;
      color: var(--col-primary-dark);
    }

    #game-end-link {
      display: inline-block;
      color: var(--col-white);
      font-size: 24px;
      text-decoration: none;
      background-color: var(--col-primary-light);
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 4px 4px 0 var(--col-shadow);
    }

    #game-end-link:hover {
      background-color: var(--col-primary);
      box-shadow: 6px 6px 0 var(--col-shadow);
    }

    #legend-highscore {
      font-size: 12px;
      color: #666;
      margin-bottom: 2px;
    }

    #legend-highscore span {
      color: var(--col-primary-dark);
      font-size: 16px;
      font-weight: 900;
    }

    #legend-next {
      font-size: 13px;
      color: #333;
      padding: 6px 0;
      border-bottom: 2px dotted var(--col-primary);
      margin-bottom: 4px;
    }

    #legend-next b {
      color: var(--col-primary-dark);
    }

    .legend-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 6px;
    }

    .legend-row span {
      color: #333;
    }

    .legend-row b {
      color: var(--col-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="game-canvas">
      <div id="game-ui">
        <p id="game-score"></p>

        <div id="game-end-container">
          <div id="game-end">
            <div id="game-end-title">Game Over!</div>
            <a id="game-end-link" href="">Try Again</a>
          </div>
        </div>

        <div id="game-highscore-value" style="display:none">0</div>
      </div>
    </div>
    <div id="legend">
      <div id="legend-title">貓咪等級</div>
      <div id="legend-items"></div>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-highscore">最高分：<span id="highscore-value">0</span></div>
    <div id="status-next">下一個：<span id="next-text">－</span></div>
    <div id="status-buttons">
      <button id="mobile-legend-btn">📋</button>
      <button id="restart-btn">🔄</button>
    </div>
  </div>
  <div id="mobile-legend-overlay">
    <div id="mobile-legend-panel">
      <button id="mobile-legend-close">✕</button>
      <div id="mobile-legend-content"></div>
    </div>
  </div>
  <script type="text/javascript" src="./matter.js"></script>
  <script type="text/javascript" src="./index.js?v=4"></script>
</body>
</html>
